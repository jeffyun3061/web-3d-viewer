spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  file:
    name: logs/backend-dev.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/archived/backend-dev-%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30

app:
  cors:
    allowed-origins: http://localhost:3000
